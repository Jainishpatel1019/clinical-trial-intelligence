name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate demo data
        run: python scripts/generate_demo_data.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Evaluation stack (fast, skip RAG model download)
        env:
          EVAL_SKIP_RAG: "1"
        run: python evaluation/run_all.py --fast --out /tmp/eval_summary.json

      - name: Check core imports
        run: |
          python -c "from src.data.schema import get_connection; print('schema OK')"
          python -c "from src.causal.hte_model import HTEModel; print('causal OK')"
          python -c "from src.simulation.bandit import AdaptiveTrialSimulator; print('sim OK')"
          python -c "from src.rag.indexer import TrialIndexer; print('rag OK')"
          python -c "from app.theme import inject_theme; print('theme OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clinical-trial-intelligence .
